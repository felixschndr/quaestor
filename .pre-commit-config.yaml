repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: '^source/frontend/tsconfig.*\.json$'
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/timothycrosley/isort
    rev: 9.0.0a3
    hooks:
      - id: isort

  - repo: https://github.com/ambv/black
    rev: 26.5.1
    hooks:
      - id: black
        args: [ '--line-length', '120' ]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-r']

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-annotations
          - flake8-force-keyword-arguments
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-async
          - flake8-timeout
          - flake8-tidy-imports
          - pep8-naming

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        files: '^source/frontend/.*\.(ts|tsx|js|jsx|css|json|md|html|yaml|yml)$'
        exclude: '^source/frontend/(pnpm-lock\.yaml|src/routeTree\.gen\.ts)$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint
        language: system
        entry: pnpm -C source/frontend lint
        files: '^source/frontend/.*\.(ts|tsx|js|jsx)$'
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend tsc
        language: system
        entry: pnpm -C source/frontend typecheck
        files: '^source/frontend/.*\.(ts|tsx)$'
        pass_filenames: false

      - id: check-i18n
        name: check i18n keys
        language: system
        entry: python3 scripts/check_i18n.py
        files: '^source/frontend/src/(.*\.(ts|tsx)|i18n/locales/.*\.json)$'
        pass_filenames: false

      - id: check-transaction-category-mapping
        name: check transaction category mapping
        language: system
        entry: python3 scripts/check_transaction_category_mapping.py
        files: '^source/backend/models/transaction_category.py$'
        pass_filenames: false
