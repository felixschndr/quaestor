version: '3'


silent: true

vars:
  FRONTEND_DIR: source/frontend
  BACKEND_COV_SRC: source/backend
  FRONTEND_PORT: '{{ .FRONTEND_PORT | default "8000" }}'
  BACKEND_DEV_PORT: '{{ .BACKEND_DEV_PORT | default "8001" }}'

tasks:
  lint:
    desc: Run pre-commit on all non-git-ignored files
    cmds:
      - git ls-files --cached --others --exclude-standard -z | xargs -0 pre-commit run --files

  backend:test:
    desc: Run backend pytest suite
    env:
      ALLOW_MISSING_FRONTEND: 'true'
    cmds:
      - poetry run pytest --cov={{.BACKEND_COV_SRC}} --cov-report=term-missing

  backend:test_e2e:
    desc: Run end to end test
    env:
      RUN_E2E: 1
      ALLOW_MISSING_FRONTEND: 'true'
    cmds:
      - poetry run pytest -s tests/backend/test_e2e.py

  frontend:test:
    desc: Run frontend Vitest suite
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - pnpm test

  test:
    desc: Run both backend and frontend test suites
    cmds:
      - task: backend:test
      - task: frontend:test

  clean_backend_db:
    desc: Delete all data from the backend database and apply migrations
    cmds:
      - bash scripts/cleanup_db.sh

  frontend:build:
    desc: Production-build the frontend into source/frontend/dist/
    dir: '{{ .FRONTEND_DIR }}'
    cmds:
      - pnpm build

  run:dev:backend:
    desc: Run the backend with autoreload
    env:
      ALLOW_MISSING_FRONTEND: 'true'
    cmds:
      - poetry run uvicorn source.backend.main:app --reload --host 127.0.0.1 --port {{ .BACKEND_DEV_PORT }}

  run:dev:frontend:
    desc: Run the Vite dev server (proxies /api → :8000)
    dir: '{{ .FRONTEND_DIR }}'
    env:
      FRONTEND_PORT: '{{ .FRONTEND_PORT }}'
      BACKEND_DEV_PORT: '{{ .BACKEND_DEV_PORT }}'
    cmds:
      - pnpm dev

  run:dev:
    desc: Run backend (autoreload) and Vite dev server in parallel
    deps: [run:dev:backend, run:dev:frontend]

  run:prod:
    desc: Build the frontend, then start the backend
    env:
      PORT: '{{ .FRONTEND_PORT }}'
    cmds:
      - task: frontend:build
      - poetry run python -m source.backend.server
