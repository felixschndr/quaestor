name: Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.11.0 # 11.12.0's self-installer is broken ("Cannot use 'in' operator ...")

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: source/frontend
        run: pnpm install --frozen-lockfile

      - name: Cache pre-commit envs between CI runs
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
