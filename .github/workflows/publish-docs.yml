name: Publish API docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check_version:
    uses: ./.github/workflows/check-version.yml

  build:
    runs-on: ubuntu-latest
    needs: check_version
    if: github.event_name == 'workflow_dispatch' || needs.check_version.outputs.version_changed == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'push' && needs.check_version.outputs.bump_sha || '' }}

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Install Poetry
        run: pipx install poetry

      - name: Install backend dependencies
        run: poetry install --no-interaction --no-root

      - name: Generate OpenAPI spec
        run: poetry run python scripts/docs/dump_openapi.py site/openapi.json

      - name: Build static ReDoc page
        run: npx --yes @redocly/cli build-docs site/openapi.json -o site/index.html --title "Quaestor API Docs"

      - name: Add favicon and supported-banks link
        run: |
          cp source/frontend/public/favicon.png site/favicon.png
          sed -i 's#</head>#<link rel="icon" type="image/png" href="favicon.png"></head>#' site/index.html
          link='<a href="banks.html" style="position:fixed;top:12px;right:16px;z-index:1000;padding:6px 12px;border-radius:8px;background:rgb(3,236,252);color:rgb(30,30,30);font:600 14px system-ui,sans-serif;text-decoration:none">Supported banks</a>'
          sed -i "s#</body>#${link}</body>#" site/index.html

      - name: Build supported-banks page
        run: poetry run python scripts/docs/dump_bank_catalog.py site/banks.html

      - name: Copy bank logos
        run: |
          mkdir -p site/static/banks
          cp source/backend/static/banks/*.png site/static/banks/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
