name: Check whether the version was bumped

on:
  workflow_call:
    outputs:
      version_changed:
        value: ${{ jobs.check_version.outputs.version_changed }}
      current_version:
        value: ${{ jobs.check_version.outputs.current_version }}
      bump_sha:
        value: ${{ jobs.check_version.outputs.bump_sha }}

permissions:
  contents: read

jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      current_version: ${{ steps.check_version.outputs.version }}
      bump_sha: ${{ steps.check_version.outputs.bump_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 20

      - name: Compare current version against the latest release
        id: check_version
        run: |
          version=$(sed -nE 's/^version *= *"(.*)"/\1/p' pyproject.toml | head -n1)
          echo "Current version: ${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

          bump_sha=$(git log -n1 --no-show-signature --format=%H -S "version = \"${version}\"" -- pyproject.toml)
          echo "Bump commit: ${bump_sha}"
          echo "bump_sha=${bump_sha}" >> $GITHUB_OUTPUT

          last_tag=$(git tag --sort=-version:refname | head -n1)
          echo "Latest release tag: ${last_tag:-<none>}"

          if [[ -z "${last_tag}" ]]; then
            version_changed=true
          elif [[ "${version}" == "${last_tag}" ]]; then
            version_changed=false
          else
            newest=$(printf '%s\n%s\n' "${last_tag}" "${version}" | sort -V | tail -n1)
            if [[ "${newest}" == "${version}" ]]; then
              version_changed=true
            else
              version_changed=false
            fi
          fi
          echo "Version newer than latest release: ${version_changed}"
          echo "version_changed=${version_changed}" >> $GITHUB_OUTPUT
