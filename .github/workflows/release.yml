name: Pipeline that builds and releases the container image

on:
  # Single CI entry point
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PLATFORMS: linux/amd64
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  tests:
    uses: ./.github/workflows/tests.yml

  check_version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      current_version: ${{ steps.check_version.outputs.version }}
      bump_sha: ${{ steps.check_version.outputs.bump_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 20

      - name: Compare current version against the latest release
        id: check_version
        run: |
          version=$(grep -E '^version\s*=\s*".*"' pyproject.toml | head -n1 | sed -E 's/version\s*=\s*"(.*)"/\1/' | sed 's/[\r\n]*$//')
          echo "Current version: ${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

          bump_sha=$(git log -n1 --no-show-signature --format=%H -S "version = \"${version}\"" -- pyproject.toml)
          echo "Bump commit: ${bump_sha}"
          echo "bump_sha=${bump_sha}" >> $GITHUB_OUTPUT

          last_tag=$(git tag --sort=-version:refname | head -n1)
          echo "Latest release tag: ${last_tag:-<none>}"

          if [[ -z "${last_tag}" ]]; then
            version_changed=true
          elif [[ "${version}" == "${last_tag}" ]]; then
            version_changed=false
          else
            newest=$(printf '%s\n%s\n' "${last_tag}" "${version}" | sort -V | tail -n1)
            if [[ "${newest}" == "${version}" ]]; then
              version_changed=true
            else
              version_changed=false
            fi
          fi
          echo "Version newer than latest release: ${version_changed}"
          echo "version_changed=${version_changed}" >> $GITHUB_OUTPUT

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: [ check_version, lint, tests ]
    permissions:
      contents: read
      packages: write
    # Dependabot doesn't need a container image, so skip the build there.
    # Otherwise build for every PR, but on main only when the version changed.
    if: >-
      github.actor != 'dependabot[bot]'
      && (github.ref != 'refs/heads/main' || needs.check_version.outputs.version_changed == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ (github.ref == 'refs/heads/main' && needs.check_version.outputs.version_changed == 'true') && needs.check_version.outputs.bump_sha || '' }}

      - name: Login to GitHub Container Registry
        # Only trusted runs may push: pushes to main and PRs from this repo.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.check_version.outputs.current_version }},enable=${{ github.ref == 'refs/heads/main' && needs.check_version.outputs.version_changed == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [check_version, build-and-push-image]
    if: github.ref == 'refs/heads/main' && needs.check_version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.check_version.outputs.bump_sha }}

      - name: Get last release tag
        id: get_last_release
        run: |
          last_tag=$(git tag --sort=-version:refname | head -n1)
          echo "last_tag=$last_tag" >> $GITHUB_OUTPUT
          echo "Last release tag: $last_tag"

      - name: Get commit log since last release
        id: get_commit_log
        run: |
          last_tag="${{ steps.get_last_release.outputs.last_tag }}"
          if [[ -z "${last_tag}" ]]; then
            commit_log=$(git log --pretty=format:"- %h %s")
          else
            commit_log=$(git log ${last_tag}..HEAD --pretty=format:"- %h %s")
          fi
          echo "commit_log<<EOF" >> $GITHUB_ENV
          echo "${commit_log}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check_version.outputs.current_version }}
          name: Release ${{ needs.check_version.outputs.current_version }}
          body: |
            ## Commits since the last release
            ${{ env.commit_log }}

            If you like the project, please consider giving it a star on GitHub, thank you very much! ⭐
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
