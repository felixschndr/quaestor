name: Pipeline that builds and releases the container image

on:
  # Single CI entry point
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  # Only trusted runs may push: pushes to main and PRs from this repo.
  TRUSTED_RUN: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  tests:
    uses: ./.github/workflows/tests.yml

  check_version:
    uses: ./.github/workflows/check-version.yml

  # Each platform is built natively (no QEMU emulation) and pushed to the registry by digest only; merge-manifests then
  # ties them together under the actual tags.
  # Pattern: https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
  build-and-push-image:
    needs: [ check_version, lint, tests ]
    permissions:
      contents: read
      packages: write
    # Dependabot doesn't need a container image, so skip the build there.
    # Otherwise build for every PR, but on main only when the version changed.
    if: >-
      github.actor != 'dependabot[bot]'
      && (github.ref != 'refs/heads/main' || needs.check_version.outputs.version_changed == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            pair: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ (github.ref == 'refs/heads/main' && needs.check_version.outputs.version_changed == 'true') && needs.check_version.outputs.bump_sha || '' }}

      - name: Login to GitHub Container Registry
        if: env.TRUSTED_RUN == 'true'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ env.TRUSTED_RUN }}
          cache-from: type=gha,scope=${{ matrix.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.pair }}

      - name: Export digest
        if: env.TRUSTED_RUN == 'true'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: env.TRUSTED_RUN == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digests-${{ matrix.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    runs-on: ubuntu-latest
    needs: [ check_version, build-and-push-image ]
    # For untrusted runs nothing was pushed, so there is nothing to merge.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.check_version.outputs.current_version }},enable=${{ github.ref == 'refs/heads/main' && needs.check_version.outputs.version_changed == 'true' }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${DOCKER_METADATA_OUTPUT_JSON}") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

  release:
    needs: [check_version, merge-manifests]
    if: github.ref == 'refs/heads/main' && needs.check_version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ needs.check_version.outputs.bump_sha }}

      - name: Get last release tag
        id: get_last_release
        run: |
          last_tag=$(git tag --sort=-version:refname | head -n1)
          echo "last_tag=$last_tag" >> $GITHUB_OUTPUT
          echo "Last release tag: $last_tag"

      - name: Get commit log since last release
        id: get_commit_log
        run: |
          last_tag="${{ steps.get_last_release.outputs.last_tag }}"
          if [[ -z "${last_tag}" ]]; then
            commit_log=$(git log --pretty=format:"- %h %s")
          else
            commit_log=$(git log ${last_tag}..HEAD --pretty=format:"- %h %s")
          fi
          echo "commit_log<<EOF" >> $GITHUB_ENV
          echo "${commit_log}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ needs.check_version.outputs.current_version }}
          target_commitish: ${{ needs.check_version.outputs.bump_sha }}
          name: Release ${{ needs.check_version.outputs.current_version }}
          body: |
            ## Commits since the last release
            ${{ env.commit_log }}

            If you like the project, please consider giving it a star on GitHub, thank you very much! ⭐
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
