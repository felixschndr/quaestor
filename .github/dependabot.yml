version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3 # Prevent supply chain attacks.
    # Assignment happens in .github/workflows/dependabot-auto-merge.yml
    labels:
      - "dependencies"
      - "backend"
    ignore: # See pyproject.toml
      - dependency-name: "mt-940"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/source/frontend"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    labels:
      - "dependencies"
      - "frontend"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    labels:
      - "dependencies"
      - "github-actions"
    ignore:
      # Action bumps can't be auto-merged (GITHUB_TOKEN may not merge workflow-file changes)
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
