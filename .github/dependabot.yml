version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3 # Updates have to be at least 3 days old to prevent supply chain attacks.
    assignees:
      - "felixschndr"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    assignees:
      - "felixschndr"
    labels:
      - "dependencies"
      - "github-actions"
